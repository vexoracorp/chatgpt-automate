info:
  title: Relay Dashboard API
  description: API documentation for Relay Dashboard
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    RegisterDto:
      type: object
      properties:
        token:
          type: string
          example: invite-token-here
        name:
          type: string
          example: John Doe
        password:
          type: string
          example: securepass123
      required:
        - token
        - name
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: securepass123
      required:
        - email
        - password
    CompleteTwoFactorDto:
      type: object
      properties:
        challengeToken:
          type: string
          description: Challenge token from initial login
        code:
          type: string
          description: Two-factor verification code
      required:
        - challengeToken
        - code
    TwoFactorChallengeDto:
      type: object
      properties:
        challengeToken:
          type: string
          description: Challenge token from initial login
      required:
        - challengeToken
    ChangePasswordDto:
      type: object
      properties:
        changePasswordToken:
          type: string
          description: Password change token from login
        newPassword:
          type: string
          description: New password
          minLength: 8
      required:
        - changePasswordToken
        - newPassword
    VerifyTotpDto:
      type: object
      properties:
        code:
          type: string
          description: 6-digit TOTP code from authenticator app
      required:
        - code
    VerifyRecoveryDto:
      type: object
      properties:
        code:
          type: string
          description: Recovery code issued for two-factor authentication fallback
          example: a1b2c3d4
      required:
        - code
    VerifyEmailCodeDto:
      type: object
      properties:
        code:
          type: string
          description: 6-digit email verification code
      required:
        - code
    UpdateTwoFactorSettingsDto:
      type: object
      properties:
        enabled:
          type: boolean
        preferredMethod:
          type: string
          enum:
            - TOTP
            - EMAIL
            - WEBAUTHN
    CreditOperationDto:
      type: object
      properties:
        amount:
          type: number
          description: Credit amount
        type:
          type: string
          enum:
            - TOP_UP
            - ADJUSTMENT
            - REFUND
          default: TOP_UP
        description:
          type: string
          description: Reason for credit operation
        referenceId:
          type: string
      required:
        - amount
        - description
    RecordPaymentDto:
      type: object
      properties:
        amount:
          type: number
          description: Payment amount
        description:
          type: string
          description: Payment description
      required:
        - amount
    VoidPaymentDto:
      type: object
      properties:
        reason:
          type: string
          description: Reason for voiding the payment
      required:
        - reason
    CreateProxyDto:
      type: object
      properties:
        url:
          type: string
          example: https://proxy.example.com
        label:
          type: string
          example: US West
        region:
          type: string
          example: us-west-2
        weight:
          type: number
          example: 1
        maxConnections:
          type: number
          example: 100
      required:
        - url
    UpdateProxyDto:
      type: object
      properties:
        url:
          type: string
          example: https://proxy.example.com
        label:
          type: object
          nullable: true
          example: US West
        isActive:
          type: boolean
          example: true
        region:
          type: object
          nullable: true
          example: us-west-2
        weight:
          type: number
          example: 1
        maxConnections:
          type: object
          nullable: true
          example: 100
    ProxyReassignmentDto:
      type: object
      properties:
        providerId:
          type: string
          example: provider-uuid
        target:
          type: string
          example: auto
          description: '"auto" | "none" | "{proxyId}"'
      required:
        - providerId
        - target
    DeleteProxyDto:
      type: object
      properties:
        reassignments:
          type: array
          items:
            $ref: '#/components/schemas/ProxyReassignmentDto'
    UpdateSettingsDto:
      type: object
      properties:
        twoFactorRequired:
          type: boolean
    UpdateHealthMonitorSettingsDto:
      type: object
      properties:
        windowSize:
          type: number
        threshold:
          type: number
        minSampleSize:
          type: number
        cooldownMs:
          type: number
        probeCount:
          type: number
        notificationCooldownMs:
          type: number
    AdminStatsDto:
      type: object
      properties:
        totalUsers:
          type: number
          example: 1000
        totalOrgs:
          type: number
          example: 200
        totalProjects:
          type: number
          example: 500
        totalApiRequests:
          type: number
          example: 1000000
        totalTokensConsumed:
          type: number
          example: 5000000
      required:
        - totalUsers
        - totalOrgs
        - totalProjects
        - totalApiRequests
        - totalTokensConsumed
    CreateInviteDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        role:
          type: string
          example: MEMBER
          enum:
            - MANAGER
            - MEMBER
      required:
        - email
        - role
    OrgListItemDto:
      type: object
      properties:
        id:
          type: string
          example: org_123
        name:
          type: string
          example: Acme Corp
        slug:
          type: string
          example: acme-corp
        role:
          type: string
          example: MANAGER
        creditBalance:
          type: number
          example: 450
        isActive:
          type: boolean
          example: true
      required:
        - id
        - name
        - slug
        - role
        - creditBalance
        - isActive
    CreateOrgDto:
      type: object
      properties:
        name:
          type: string
          example: Acme Corp
      required:
        - name
    OrgDetailDto:
      type: object
      properties:
        id:
          type: string
          example: org_123
        name:
          type: string
          example: Acme Corp
        slug:
          type: string
          example: acme-corp
        creditBalance:
          type: number
          example: 450
        killSwitchActive:
          type: boolean
          example: false
        isActive:
          type: boolean
          example: true
        createdAt:
          format: date-time
          type: string
          example: '2026-03-15T00:00:00.000Z'
      required:
        - id
        - name
        - slug
        - creditBalance
        - killSwitchActive
        - isActive
        - createdAt
    BackupNotificationItemDto:
      type: object
      properties:
        id:
          type: string
          example: notification_123
        sentAt:
          format: date-time
          type: string
          example: '2026-03-17T12:00:00.000Z'
        triggeredByProviderId:
          type: object
          example: provider_123
          nullable: true
      required:
        - id
        - sentAt
        - triggeredByProviderId
    BackupNotificationListResponseDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BackupNotificationItemDto'
        nextCursor:
          type: object
          example: notification_122
          nullable: true
      required:
        - data
        - nextCursor
    UpdateSmtpSettingsDto:
      type: object
      properties:
        smtpHost:
          type: object
          nullable: true
        smtpPort:
          type: object
          nullable: true
        smtpUser:
          type: object
          nullable: true
        smtpPass:
          type: object
          nullable: true
        smtpFrom:
          type: object
          nullable: true
    CreateApiKeyDto:
      type: object
      properties:
        type:
          type: string
          enum:
            - MEMBER
            - SERVICE
          default: MEMBER
        label:
          type: string
          description: Human-readable label for the API key (e.g. "Management Key")
          example: Management Key
    UpdateApiKeyDto:
      type: object
      properties:
        label:
          type: object
          nullable: true
          description: Human-readable label for the API key
          example: Management Key
        isActive:
          type: boolean
          description: Whether the API key is active
    CreateProjectDto:
      type: object
      properties:
        name:
          type: string
          example: Production
        slug:
          type: string
          example: production
      required:
        - name
        - slug
    UpdateProjectDto:
      type: object
      properties:
        name:
          type: string
          example: Production
        isActive:
          type: boolean
