openapi: 3.0.0
paths:
  /auth/register:
    post:
      operationId: AuthController_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User registered and logged in
        '400':
          description: Validation error
        '404':
          description: Invite not found or expired
        '409':
          description: Email already registered
      summary: Register via invite token
      tags:
        - Auth
  /auth/invite-info:
    get:
      operationId: AuthController_getInviteInfo
      parameters:
        - name: token
          required: true
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Invite info
        '404':
          description: Invite not found or expired
      summary: Get invite details by token
      tags:
        - Auth
  /auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
      summary: Login with email and password
      tags:
        - Auth
  /auth/2fa/complete:
    post:
      operationId: AuthController_completeTwoFactor
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTwoFactorDto'
      responses:
        '200':
          description: 2FA verification successful
        '401':
          description: Invalid challenge token or code
      summary: Complete 2FA login with challenge token and code
      tags:
        - Auth
  /auth/2fa/email-challenge:
    post:
      operationId: AuthController_requestEmailChallenge
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeDto'
      responses:
        '200':
          description: Email code sent
        '401':
          description: Invalid challenge token
      summary: Request email code for 2FA challenge
      tags:
        - Auth
  /auth/2fa/webauthn/options:
    post:
      operationId: AuthController_getWebAuthnChallengeOptions
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeDto'
      responses:
        '200':
          description: WebAuthn options generated
        '401':
          description: Invalid challenge token
      summary: Get WebAuthn authentication options for 2FA challenge
      tags:
        - Auth
  /auth/2fa/webauthn/verify:
    post:
      operationId: AuthController_completeWebAuthnChallenge
      parameters: []
      responses:
        '200':
          description: WebAuthn verification successful
        '401':
          description: Invalid challenge or response
      summary: Verify WebAuthn response for 2FA challenge
      tags:
        - Auth
  /auth/me:
    get:
      operationId: AuthController_me
      parameters: []
      responses:
        '200':
          description: Current user profile
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Get current user profile
      tags:
        - Auth
  /auth/change-password:
    post:
      operationId: AuthController_changePassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: Password changed and logged in
        '401':
          description: Invalid or expired change token
      summary: Change password after admin reset
      tags:
        - Auth
  /auth/2fa/totp/enroll:
    post:
      operationId: TotpController_enroll
      parameters: []
      responses:
        '201':
          description: TOTP enrolled
      security:
        - bearer: []
      summary: Enroll current user into TOTP 2FA
      tags:
        - Auth
  /auth/2fa/totp/verify:
    post:
      operationId: TotpController_verify
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTotpDto'
      responses:
        '200':
          description: TOTP verified
      security:
        - bearer: []
      summary: Verify TOTP code and enable 2FA
      tags:
        - Auth
  /auth/2fa/totp:
    delete:
      operationId: TotpController_disable
      parameters: []
      responses:
        '204':
          description: TOTP disabled
      security:
        - bearer: []
      summary: Disable TOTP 2FA for current user
      tags:
        - Auth
  /api/orgs/{slug}/members/{userId}/2fa:
    delete:
      operationId: TotpOrgController_disableMemberTotp
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: TOTP disabled for member
      security:
        - bearer: []
      summary: Disable TOTP for an org member
      tags:
        - Auth
  /api/admin/users/{userId}/2fa:
    delete:
      operationId: TotpAdminController_adminDisable
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: TOTP disabled by admin
      security:
        - bearer: []
      summary: Admin disable TOTP for any user
      tags:
        - Auth
  /auth/2fa/recovery/regenerate:
    post:
      operationId: RecoveryController_regenerate
      parameters: []
      responses:
        '201':
          description: Recovery codes regenerated
      security:
        - bearer: []
      summary: Regenerate recovery codes for current user
      tags:
        - Auth
  /auth/2fa/recovery/verify:
    post:
      operationId: RecoveryController_verify
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRecoveryDto'
      responses:
        '200':
          description: Recovery code verified
      security:
        - bearer: []
      summary: Verify a recovery code for current user
      tags:
        - Auth
  /auth/2fa/email/send:
    post:
      operationId: EmailCodeController_send
      parameters: []
      responses:
        '200':
          description: Email code sent
      security:
        - bearer: []
      summary: Send a 2FA email verification code
      tags:
        - Auth
  /auth/2fa/email/verify:
    post:
      operationId: EmailCodeController_verify
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailCodeDto'
      responses:
        '200':
          description: Email code verified
      security:
        - bearer: []
      summary: Verify a 2FA email code
      tags:
        - Auth
  /auth/webauthn/register/options:
    post:
      operationId: WebAuthnController_registerOptions
      parameters: []
      responses:
        '200':
          description: Registration options generated
      security:
        - bearer: []
      summary: Generate WebAuthn registration options
      tags:
        - Auth
  /auth/webauthn/register/verify:
    post:
      operationId: WebAuthnController_registerVerify
      parameters: []
      responses:
        '201':
          description: Passkey registered
      security:
        - bearer: []
      summary: Verify WebAuthn registration response
      tags:
        - Auth
  /auth/webauthn/credentials:
    get:
      operationId: WebAuthnController_listCredentials
      parameters: []
      responses:
        '200':
          description: List of passkeys
      security:
        - bearer: []
      summary: List registered passkeys
      tags:
        - Auth
  /auth/webauthn/credentials/{id}:
    delete:
      operationId: WebAuthnController_deleteCredential
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: Passkey deleted
      security:
        - bearer: []
      summary: Delete a registered passkey
      tags:
        - Auth
  /auth/2fa/status:
    get:
      operationId: TwoFactorSettingsController_getStatus
      parameters: []
      responses:
        '200':
          description: 2FA status
      security:
        - bearer: []
      summary: Get 2FA status and enabled methods
      tags:
        - Auth
  /auth/2fa/settings:
    patch:
      operationId: TwoFactorSettingsController_updateSettings
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTwoFactorSettingsDto'
      responses:
        '200':
          description: 2FA settings updated
      security:
        - bearer: []
      summary: Update 2FA settings
      tags:
        - Auth
  /admin/health:
    get:
      operationId: AdminController_health
      parameters: []
      responses:
        '200':
          description: Service is healthy
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
      security:
        - bearer: []
      summary: Admin health check
      tags:
        - Admin
  /admin/api-keys:
    get:
      operationId: AdminApiKeysController_list
      parameters:
        - name: cursor
          required: false
          in: query
          schema:
            example: eyJpZCI6IjEyMyJ9
            type: string
        - name: limit
          required: false
          in: query
          schema:
            example: '20'
            type: string
        - name: search
          required: false
          in: query
          schema:
            example: john
            type: string
        - name: orgId
          required: false
          in: query
          schema:
            example: uuid-here
            type: string
        - name: isActive
          required: false
          in: query
          schema:
            example: true
            type: boolean
      responses:
        '200':
          description: Paginated API keys list
      security:
        - bearer: []
      summary: List all API keys across organizations
      tags:
        - Admin API Keys
  /admin/api-keys/{id}:
    get:
      operationId: AdminApiKeysController_detail
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: API key detail
        '404':
          description: API key not found
      security:
        - bearer: []
      summary: Get API key detail with usage stats
      tags:
        - Admin API Keys
  /admin/api-keys/{id}/revoke:
    patch:
      operationId: AdminApiKeysController_revoke
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: API key revoked
        '404':
          description: API key not found
      security:
        - bearer: []
      summary: Revoke an API key
      tags:
        - Admin API Keys
  /admin/api-keys/{id}/rate-limit:
    patch:
      operationId: AdminApiKeysController_updateRateLimit
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                limit:
                  type: number
      responses:
        '200':
          description: Rate limit updated
        '404':
          description: API key or provider not found
      security:
        - bearer: []
      summary: Update rate limit for API key provider
      tags:
        - Admin API Keys
  /admin/api-keys/{id}/model-access:
    patch:
      operationId: AdminApiKeysController_toggleModelAccess
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                modelId:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Model access toggled
        '404':
          description: API key or model not found
      security:
        - bearer: []
      summary: Toggle model access
      tags:
        - Admin API Keys
  /admin/backup-notifications:
    get:
      operationId: AdminBackupNotificationsController_list
      parameters:
        - name: cursor
          required: false
          in: query
          schema:
            type: string
        - name: limit
          required: false
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated backup notifications list
      security:
        - bearer: []
      summary: List all backup usage notifications across orgs
      tags:
        - Admin Backup Notifications
  /admin/orgs/{id}/credits:
    get:
      operationId: AdminCreditsController_listCredits
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: cursor
          required: false
          in: query
          schema:
            example: eyJpZCI6IjEyMyJ9
            type: string
        - name: limit
          required: false
          in: query
          schema:
            example: '20'
            type: string
        - name: from
          required: false
          in: query
          schema:
            example: '2026-03-10T00:00:00.000Z'
            type: string
        - name: to
          required: false
          in: query
          schema:
            example: '2026-03-13T23:59:59.999Z'
            type: string
        - name: type
          required: false
          in: query
          schema:
            enum:
              - TOP_UP
              - USAGE
              - ADJUSTMENT
              - REFUND
            type: string
      responses:
        '200':
          description: Credit balance and paginated transactions
      security:
        - bearer: []
      summary: List credit transactions for an organization
      tags:
        - Admin Credits
    post:
      operationId: AdminCreditsController_createCreditOperation
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditOperationDto'
      responses:
        '201':
          description: Credit operation created
        '400':
          description: Validation error
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Create a credit operation for an organization
      tags:
        - Admin Credits
  /admin/orgs/{id}/discounts:
    get:
      operationId: AdminDiscountsController_getDiscounts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Discounts list
      security:
        - bearer: []
      summary: Get provider family discounts for an organization
      tags:
        - Admin Discounts
    patch:
      operationId: AdminDiscountsController_updateDiscounts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                discounts:
                  type: array
                  items:
                    type: object
                    properties:
                      providerFamily:
                        type: string
                        enum:
                          - CODEX
                          - OPENAI_COMPATIBLE
                          - KIRO
                          - COPILOT
                      multiplier:
                        type: number
      responses:
        '200':
          description: Discounts updated
      security:
        - bearer: []
      summary: Update provider family discounts
      tags:
        - Admin Discounts
  /admin/leaderboard:
    get:
      operationId: AdminLeaderboardController_getLeaderboard
      parameters:
        - name: metric
          required: false
          in: query
          description: Metric to rank by. Defaults to requests.
          schema:
            enum:
              - requests
              - tokens
              - cost
            type: string
        - name: from
          required: false
          in: query
          description: Start date (ISO 8601). Defaults to 30 days ago.
          schema:
            type: string
        - name: to
          required: false
          in: query
          description: End date (ISO 8601). Defaults to now.
          schema:
            type: string
        - name: limit
          required: false
          in: query
          description: Number of top users to return (max 100).
          schema:
            default: 10
            type: number
        - name: organizationId
          required: false
          in: query
          description: Filter by organization ID.
          schema:
            type: string
      responses:
        '200':
          description: Leaderboard entries
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - bearer: []
      summary: Get platform-wide usage leaderboard
      tags:
        - Admin Leaderboard
  /admin/orgs:
    get:
      operationId: AdminOrgsController_listOrgs
      parameters:
        - name: cursor
          required: false
          in: query
          schema:
            example: eyJpZCI6IjEyMyJ9
            type: string
        - name: limit
          required: false
          in: query
          schema:
            example: '20'
            type: string
        - name: search
          required: false
          in: query
          schema:
            example: john
            type: string
        - name: isActive
          required: false
          in: query
          schema:
            example: true
            type: boolean
      responses:
        '200':
          description: Paginated organizations list
      security:
        - bearer: []
      summary: List organizations with pagination and filters
      tags:
        - Admin Orgs
    post:
      operationId: AdminOrgsController_createOrg
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
              required:
                - name
                - slug
      responses:
        '201':
          description: Organization created
        '400':
          description: Validation error
      security:
        - bearer: []
      summary: Create a new organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}:
    get:
      operationId: AdminOrgsController_getOrgDetail
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Organization detail
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Get organization detail
      tags:
        - Admin Orgs
    delete:
      operationId: AdminOrgsController_softDeleteOrg
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Organization deactivated
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Soft delete an organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/hard:
    delete:
      operationId: AdminOrgsController_hardDeleteOrg
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Organization permanently deleted
        '400':
          description: Organization must be deactivated first
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Permanently delete a deactivated organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/reactivate:
    post:
      operationId: AdminOrgsController_reactivateOrg
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Organization reactivated
        '400':
          description: Organization is already active
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Reactivate a deactivated organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/settings:
    patch:
      operationId: AdminOrgsController_updateOrgSettings
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                killSwitchActive:
                  type: boolean
                billingHoldActive:
                  type: boolean
                paymentDueDay:
                  type: number
                paymentGraceDays:
                  type: number
                smtpHost:
                  type: string
                smtpPort:
                  type: number
                smtpUser:
                  type: string
                smtpPass:
                  type: string
                smtpFrom:
                  type: string
      responses:
        '200':
          description: Organization settings updated
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Update organization settings
      tags:
        - Admin Orgs
  /admin/orgs/{id}/members:
    post:
      operationId: AdminOrgsController_addMember
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                role:
                  type: string
                  enum:
                    - MANAGER
                    - MEMBER
              required:
                - userId
      responses:
        '201':
          description: Member added
        '404':
          description: Organization not found
      security:
        - bearer: []
      summary: Add a member to an organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/members/{userId}:
    delete:
      operationId: AdminOrgsController_removeMember
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: Member removed
        '404':
          description: Membership not found
      security:
        - bearer: []
      summary: Remove a member from an organization
      tags:
        - Admin Orgs
    patch:
      operationId: AdminOrgsController_updateMemberRole
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - MANAGER
                    - MEMBER
              required:
                - role
      responses:
        '200':
          description: Member role updated
        '404':
          description: Membership not found
      security:
        - bearer: []
      summary: Update a member role in an organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/invites:
    get:
      operationId: AdminOrgsController_listInvites
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: List of pending invites
      security:
        - bearer: []
      summary: List pending invites for an organization
      tags:
        - Admin Orgs
    post:
      operationId: AdminOrgsController_createInvite
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum:
                    - MANAGER
                    - MEMBER
              required:
                - email
                - role
      responses:
        '201':
          description: Invite created
        '404':
          description: Organization not found
        '409':
          description: Duplicate invite
      security:
        - bearer: []
      summary: Create an invite for an organization
      tags:
        - Admin Orgs
  /admin/orgs/{id}/invites/{inviteId}/resend:
    post:
      operationId: AdminOrgsController_resendInvite
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: inviteId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: Invite resent
        '404':
          description: Invite not found
      security:
        - bearer: []
      summary: Resend an invite email
      tags:
        - Admin Orgs
  /admin/orgs/{id}/invites/{inviteId}:
    delete:
      operationId: AdminOrgsController_cancelInvite
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: inviteId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: Invite cancelled
        '404':
          description: Invite not found
        '409':
          description: Cannot cancel accepted invite
      security:
        - bearer: []
      summary: Cancel an invite
      tags:
        - Admin Orgs
  /admin/orgs/{id}/payments:
    post:
      operationId: AdminPaymentsController_recordPayment
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentDto'
      responses:
        '201':
          description: Payment recorded
      security:
        - bearer: []
      summary: Record a payment for an organization
